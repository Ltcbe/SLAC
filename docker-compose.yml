services:
  db:
    image: postgres:16
    container_name: sncb_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sncb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sncb}
      POSTGRES_DB: ${POSTGRES_DB:-sncb}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sncb} -d ${POSTGRES_DB:-sncb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: sncb_backend
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT:-8080}
      # En mode ingress, le frontend appelle le backend via le réseau docker (backend:8080),
      # donc CORS n'est pas nécessaire en prod. On garde la variable pour le dev.
      CORS_ORIGIN: ${CORS_ORIGIN:-http://frontend:4173}
    # ❌ Pas d'exposition de port ici : l'ingress Dokploy ne passe pas par un mapping host
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  collector:
    build: ./collector
    container_name: sncb_collector
    depends_on:
      - backend
    environment:
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://backend:8080}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-180}
      FROM_A: ${FROM_A:-Bruxelles-Central}
      TO_A: ${TO_A:-Tournai}
      FROM_B: ${FROM_B:-Tournai}
      TO_B: ${TO_B:-Bruxelles-Central}

  # Service frontend (nom attendu par Dokploy)
  frontend:
    build: ./frontend
    container_name: sncb_frontend
    depends_on:
      - backend
    # ❌ Pas de 'ports:' : l'ingress Dokploy attachera le domaine au port 80 du conteneur
    # Conteneur écoute sur 80 (voir frontend/Dockerfile + nginx)

volumes:
  db_data:

